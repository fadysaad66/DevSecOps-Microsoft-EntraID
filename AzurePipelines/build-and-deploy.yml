trigger:
  branches:
    include:
      - main
      - master
      - release/*

variables:
  - name: deployGroup
    value: 'main'
  - name: projectName
    value: 'cruddemo'
  - name: azureServicePrincipal
    value: 'test2'
  - name: terraformResourceGroup
    value: 'rg-tf-state'
  - name: terraformStorageAccountName
    value: 'stlabstatestacc123'
  - name: terraformContainerName
    value: 'tfstate'
  - name: terraformFolder
    value: 'main'
  - name: orgnaizaionalAcr
    value: "acrdevsecopslab.azurecr.io/cruddemo"
  - name: acrsc
    value: 'acr-secdemo'
  - name: pipelineURI
    value: "$(System.CollectionUri)$(System.TeamProject)/_build?definitionId=$(System.DefinitionId)"

pool:
  name: Azure Pipelines
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  jobs:
  - job: APIBuild
    steps:
    - template: Templates/deploy-docker.yml
      parameters:
        folder: 'CRUDDemo'

- ${{ if eq(variables['deployGroup'], 'main') }}:
  - template: Templates/deploy-env.yml
    parameters:
      environment: dev
      accessGroup: "ACorpDevs"

  - template: Templates/deploy-env.yml
    parameters:
      environment: qa
      accessGroup: "ACorpDevs"

- ${{ if eq(variables['deployGroup'], 'release') }}:
  - template: Templates/deploy-env.yml
    parameters:
      environment: PP
      accessGroup: "ACorpDevs"

  - template: Templates/deploy-env.yml
    parameters:
      environment: PROD
      accessGroup: "Productionacsess"